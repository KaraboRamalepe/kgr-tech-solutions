name: KGR Tech Build & Deploy

on:
  push:
    branches:
      - main   # Trigger on every commit
  workflow_dispatch:
    inputs:
      DEPLOY_TOKEN:
        description: 'Token to authorize Netlify deploy'
        required: false

jobs:

  build-and-commit:
    name: Build & Commit Dist
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Build Nuxt site
        run: npm run generate

      # Optional: commit dist back to repo so it's versioned
      - name: Commit dist folder
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add dist
          git commit -m "Update dist folder [skip ci]" || echo "No changes to commit"
          git push

  deploy-to-netlify:
    name: Deploy to Netlify
    runs-on: ubuntu-latest
    needs: build-and-commit
    if: github.event.inputs.DEPLOY_TOKEN == secrets.NETLIFY_DEPLOY_TOKEN
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Build Nuxt site
        run: npm run generate

      - name: Deploy to Netlify
        uses: netlify/actions/cli@master
        with:
          args: deploy --prod --dir=./dist
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}